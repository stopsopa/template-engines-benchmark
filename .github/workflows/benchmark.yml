name: Benchmark

on:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.1'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Prepare
        run: /bin/bash prepare.sh

      - name: Run benchmarks
        run: /bin/bash benchmark/all.sh

      - name: Cleanup
        run: /bin/bash .github/cleanup.sh

      - name: Print summary
        run: |
          echo "### 🚀 Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "<pre>" >> $GITHUB_STEP_SUMMARY
          cat benchmark/summary.log >> $GITHUB_STEP_SUMMARY
          echo "</pre>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View full logs and run history on [GitHub Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
